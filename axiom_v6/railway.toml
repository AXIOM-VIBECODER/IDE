[build]
builder = "RAILPACK"
buildCommand = ""

[deploy]
startCommand = "node src/server.js"
healthcheckPath = "/api/ping"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[[deploy.environmentVariables]]
name = "PORT"
value = "3000"

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "production"
