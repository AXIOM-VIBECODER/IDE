[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node src/server.js"
healthcheckPath = "/api/ping"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1

[[deploy.environmentVariables]]
name = "PORT"
value = "5000"

[[deploy.environmentVariables]]
name = "NODE_ENV"
value = "production"
