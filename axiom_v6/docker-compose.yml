version: "3.9"

services:
  axiom:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axiom-ide
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-axiom_secret}
      - DB_NAME=${DB_NAME:-axiom}
      - NODE_ENV=${NODE_ENV:-production}
    depends_on:
      mysql:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - axiom-data:/home/axiom/.axiom
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/ping',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - axiom-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: axiom-migrate
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-axiom_secret}
      - DB_NAME=${DB_NAME:-axiom}
    depends_on:
      mysql:
        condition: service_healthy
    command: ["node", "scripts/migrate.js"]
    networks:
      - axiom-network

  mysql:
    image: mysql:8
    container_name: axiom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-axiom_secret}
      MYSQL_DATABASE: ${DB_NAME:-axiom}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS:-axiom_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - axiom-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

volumes:
  mysql-data:
    driver: local
  axiom-data:
    driver: local

networks:
  axiom-network:
    driver: bridge
